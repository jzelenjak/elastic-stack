# Configuration file for HTTP monitor.
# For more information about HTTP Heartbeat monitor, see the documentation:
# - https://www.elastic.co/docs/reference/beats/heartbeat/monitor-http-options
# - https://www.elastic.co/docs/reference/beats/heartbeat/monitor-options

- id: elasticsearch-cluster-health
  type: http
  schedule: '@every 15s'
  urls:
    #- ${ELASTIC_HOSTS}/_cluster/health
    - "https://es01:9200/_cluster/health"
  username: elastic
  password: elastic
  ssl:
    #certificate_authorities: ["${SSL_CERTIFICATEAUTHORITIES}"]
    certificate_authorities: ["/usr/share/heartbeat/certs/ca.crt"]
    supported_protocols: ["TLSv1.3", "TLSv1.2"]
  check.request:
    method: GET
  check.response:
    status: 200
    json:
      - description: check status
        expression: 'status == "green" || status == "yellow"'
