# Heartbeat configuration file.
# For more information, see the documentation:
# - https://www.elastic.co/docs/reference/beats/heartbeat/heartbeat-reference-yml
# - https://github.com/elastic/beats/blob/main/deploy/docker/heartbeat.docker.yml

# Directory with monitor definitions (individual yaml files)
heartbeat.config.monitors:
  # Directory + glob pattern to search for configuration files
  path: ${path.config}/monitors.d/*.yml
  # If enabled, heartbeat will periodically check the config.monitors path for changes
  reload.enabled: true
  # How often to check for changes
  reload.period: 15s

