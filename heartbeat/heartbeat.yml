processors:
  - add_cloud_metadata: ~
  - add_docker_metadata: ~

output.elasticsearch:
  hosts: ${ES_HOSTS}
  protocol: https
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  ssl.certificate_authorities: ${SSL_CERTIFICATE_AUTHORITIES}
  ssl.supported_protocols: [TLSv1.3, TLSv1.2]
  ssl.verification_mode: certificate
  ssl.enabled: true
