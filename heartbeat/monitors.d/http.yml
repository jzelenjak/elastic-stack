# Heartbeat HTTP monitor configuration file.
# For more information, see the documentation:
# - https://www.elastic.co/docs/reference/beats/heartbeat/monitor-http-options
# - https://www.elastic.co/docs/reference/beats/heartbeat/monitor-options

- id: elasticsearch-cluster-health
  type: http
  schedule: '@every 15s'
  urls:
    - "https://es01:9200/_cluster/health"
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  ssl:
    certificate_authorities: ${SSL_CERTIFICATE_AUTHORITIES}
    supported_protocols: ["TLSv1.3", "TLSv1.2"]
  check.request:
    method: GET
  check.response:
    status: 200
    json:
      - description: check status
        expression: 'status == "green" || status == "yellow"'
