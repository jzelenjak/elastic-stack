# Instances for which elasticsearch-certutil will generate a certificate.
# This includes:
# - Elasticsearch certificate(s) for HTTPS communications (e.g. REST API requests, browser access)
# - Elasticsearch certificate(s) for internode TLS communications
# - Kibana server certificate for HTTPS communications (e.g. REST API requests, browser access)
# - Kibana client certificate for mutual TLS communications with Elasticsearch
# - Certificates for other entities for mutual TLS authentication (e.g. Logstash, Beats)
# NOTE: The name must be <service>-<role>, where <role> is transport (default) or http.
# This file is used by the certificate setup script.

instances:
  - name: es01
    dns:
      - es01
      - localhost
    ip:
      - 127.0.0.1
  - name: kibana
    dns:
      - kibana
      - localhost
    ip:
      - 127.0.0.1
